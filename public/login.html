<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - PriceHub</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-container h1 {
            text-align: center;
            color: #1a73e8;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: border 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1a73e8;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #0d47a1;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            min-height: 24px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        .footer-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">🔐</div>
    <h1>PriceHub</h1>
    <p class="subtitle">لوحة تحكم الإدارة</p>

    <form id="loginForm">
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="admin@pricehub.com" required>
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
            تسجيل الدخول
        </button>
        <div class="error-message" id="errorMessage"></div>
    </form>

    <p class="footer-text">🔒 نظام إدارة آمن</p>
</div>

<script>
    // ─── Firebase Config ──────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyANjFs3-t3ij9GgjH1PCHOhpIQ6W9lm7QQ",
        authDomain: "pricehub-admin.firebaseapp.com",
        databaseURL: "https://pricehub-admin-default-rtdb.firebaseio.com",
        projectId: "pricehub-admin",
        storageBucket: "pricehub-admin.firebasestorage.app",
        messagingSenderId: "150299904907",
        appId: "1:150299904907:web:f4d38657"
    };

    // ─── Initialize Firebase ─────────────────────────────────────
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ─── DOM Elements ────────────────────────────────────────────
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');

    // ─── Check if already logged in ─────────────────────────────
    auth.onAuthStateChanged((user) => {
        if (user) {
            // ✅ المستخدم مسجل دخول، حوله للوحة التحكم
            window.location.href = '/admin.html';
        }
    });

    // ─── Login Form ──────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // ─── Validation ──────────────────────────────────────────
        if (!email || !password) {
            errorMessage.textContent = '⚠️ الرجاء ملء جميع الحقول';
            return;
        }

        // ─── Show Loading ────────────────────────────────────────
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading-spinner"></span> جاري التحقق...';
        errorMessage.textContent = '';

        try {
            // ─── Sign in with Firebase ──────────────────────────
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            
            // ✅ تم تسجيل الدخول بنجاح
            console.log('✅ Login successful:', userCredential.user.email);
            
            // ─── Redirect ────────────────────────────────────────
            window.location.href = '/admin.html';
            
        } catch (error) {
            // ─── Handle Errors ──────────────────────────────────
            console.error('❌ Login error:', error);
            
            let message = '❌ فشل تسجيل الدخول';
            switch (error.code) {
                case 'auth/user-not-found':
                    message = '⚠️ لا يوجد مستخدم بهذا البريد الإلكتروني';
                    break;
                case 'auth/wrong-password':
                    message = '⚠️ كلمة المرور غير صحيحة';
                    break;
                case 'auth/invalid-email':
                    message = '⚠️ البريد الإلكتروني غير صحيح';
                    break;
                case 'auth/too-many-requests':
                    message = '⚠️ محاولات كثيرة جداً، حاول بعد شوية';
                    break;
                default:
                    message = `❌ ${error.message}`;
            }
            errorMessage.textContent = message;
            
        } finally {
            // ─── Reset Button ────────────────────────────────────
            loginBtn.disabled = false;
            loginBtn.textContent = 'تسجيل الدخول';
        }
    });
</script>

</body>
</html>
